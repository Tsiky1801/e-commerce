<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEasy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h2>ShopEasy</h2>
    <nav>
        <a href="#">Accueil</a>
        <a href="#">Produits</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Découvrez nos meilleurs produits</h1>
    <p>Qualité, prix abordables et livraison rapide.</p>
    <button>Acheter maintenant</button>
</section>

<section class="products">
    <div class="card">
        <img src="https://via.placeholder.com/180" alt="">
        <h3>Casque</h3>
        <p>25 €</p>
        <button>Ajouter</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/180" alt="">
        <h3>Montre</h3>
        <p>40 €</p>
        <button>Ajouter</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/180" alt="">
        <h3>Sac</h3>
        <p>35 €</p>
        <button>Ajouter</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/180" alt="">
        <h3>Chaussures</h3>
        <p>55 €</p>
        <button>Ajouter</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/180" alt="">
        <h3>T-shirt</h3>
        <p>18 €</p>
        <button>Ajouter</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/180" alt="">
        <h3>Lunettes</h3>
        <p>30 €</p>
        <button>Ajouter</button>
    </div>
</section>

<footer>
    <p>© 2026 ShopEasy - Tous droits réservés.</p>
</footer>

</body>
</html>
